name: Client CI

on:
  push:
    branches: [main]
    paths:
      - "client/**"
  pull_request:
    branches: [main]
    paths:
      - "client/**"

jobs:
  client-ci:
    name: Client / ${{ matrix.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: lint
            command: lint
          - name: type-check
            command: type-check
          - name: build
            command: build
    defaults:
      run:
        working-directory: client
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: "1.2.22"

      - name: Cache Bun dependencies
        uses: actions/cache@v4
        with:
          path: |
            ~/.bun/install/cache
            client/node_modules
          key: ${{ runner.os }}-bun-client-${{ hashFiles('client/bun.lock') }}
          restore-keys: |
            ${{ runner.os }}-bun-client-

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Run ${{ matrix.command }}
        run: bun run ${{ matrix.command }}

